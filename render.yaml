services:
  - type: web
    name: regulatory-rag
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: python scripts/update_index.py
    healthCheckPath: /health
    disk:
      name: regulatory-rag-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: EMBEDDINGS_PROVIDER
        value: local
      - key: LOCAL_EMBEDDING_MODEL
        value: paraphrase-multilingual-MiniLM-L12-v2
      - key: HF_HOME
        value: /var/data/huggingface
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_DIR
        value: /var/data/chroma_db
      - key: METADATA_DIR
        value: /var/data/metadata
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: CORS_ORIGINS
        value: https://regulatory-rag.onrender.com
