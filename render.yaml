services:
  - type: web
    name: regulatory-rag-api
    runtime: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: regulatory-rag-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: EMBEDDINGS_PROVIDER
        value: local
      - key: LOCAL_EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_DIR
        value: /var/data/chroma_db
      - key: METADATA_DIR
        value: /var/data/metadata
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: regulatory-rag-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
