services:
  - type: web
    name: regulatory-rag
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: EMBEDDINGS_PROVIDER
        value: keyword
      - key: CORS_ORIGINS
        value: "*"
